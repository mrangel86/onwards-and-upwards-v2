        - generic [ref=e24]: A family of three exploring Europe one adventure at a time
      - generic [ref=e26]:
        - img "Our family portrait placeholder" [ref=e28]
        - paragraph [ref=e29]: We're Michael, Gesy, and little Victoria—three travelers on a slow journey across Europe, seeking deeper connection, fresh perspectives, and a world of new experiences together. Leaving the familiar behind, we hope to savor the little moments, discover beauty in the everyday, and write a family story of adventure, resilience, and joy. Thanks for joining us as we wander onwards & upwards.
      - generic [ref=e31]:
        - generic [ref=e32]:
          - heading "About Michael" [level=2] [ref=e33]
          - paragraph [ref=e34]: Michael is the steady anchor of our family—a curious, coffee-fueled explorer, tech enthusiast, and lifelong daydreamer. He's happiest with a camera in hand, seeking out scenic overlooks and surprising stories in everyday places.
          - paragraph [ref=e35]: With a knack for finding cozy bookshops and memorably good bakeries (and making every train connection... almost), Michael brings calm, humor, and a spirit of discovery to our travels.
        - img "Placeholder for Michael" [ref=e38]
      - generic [ref=e40]:
        - generic [ref=e41]:
          - heading "About Gesy" [level=2] [ref=e42]
          - paragraph [ref=e43]: Always chasing sunshine and singing just to make baby Victoria giggle, Gesy fills every day with warmth and energy. Brazilian at heart and spirit, she's our connector—finding joy in every encounter, laughing in every language, and turning even a simple morning stroll into a miniature adventure.
          - paragraph [ref=e44]: She brings a touch of poetry and spontaneity to our family explorations, teaching us how to savor beauty and connection wherever we go.
        - img "Placeholder for Gesy" [ref=e47]
      - generic [ref=e49]:
        - generic [ref=e50]:
          - generic [ref=e51]:
            - heading "About Victoria" [level=2] [ref=e52]
            - img [ref=e53]
          - paragraph [ref=e55]: The heart and smile of our travels, Victoria brings pure delight everywhere we go. Whether giggling from her carrier or dozing through adventures, she reminds us to slow down, look closer, and enjoy the magic in every new place (and every bakery).
          - paragraph [ref=e56]: We're endlessly grateful for each day exploring the world through her bright, wonder-filled eyes.
        - img "Placeholder for Victoria" [ref=e59]
